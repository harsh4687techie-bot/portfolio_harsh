<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Uploader</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .upload-container { max-width: 600px; margin: 5rem auto; text-align: center; }
        .upload-card { margin-top: 1rem; padding: 2rem; border: 2px dashed var(--accent-color); border-radius: 16px; background: rgba(0,0,0,0.5); }
        .file-input { margin: 1rem 0; color: white; }
    </style>
</head>
<body class="admin-body">
    <div class="upload-container glass-panel fade-in" style="padding: 2rem;">
        <h2>Simple Image Uploader</h2>
        <p>Use the buttons below to magically place the images into the project folders!</p>

        <div class="upload-card">
            <h3>Profile Picture</h3>
            <form onsubmit="uploadImage(event, 'profile.jpg')">
                <input type="file" required class="file-input" accept="image/*">
                <button type="submit" class="btn btn-primary">Upload Profile Pic</button>
            </form>
        </div>

        <div class="upload-card">
            <h3>Certificate 1 (Omkar)</h3>
            <form onsubmit="uploadImage(event, 'cert1.jpg')">
                <input type="file" required class="file-input" accept="image/*">
                <button type="submit" class="btn btn-primary">Upload Cert 1</button>
            </form>
        </div>

        <div class="upload-card">
            <h3>Certificate 2 (Letter)</h3>
            <form onsubmit="uploadImage(event, 'cert2.jpg')">
                <input type="file" required class="file-input" accept="image/*">
                <button type="submit" class="btn btn-primary">Upload Cert 2</button>
            </form>
        </div>

        <div class="upload-card">
            <h3>Certificate 3 (Python)</h3>
            <form onsubmit="uploadImage(event, 'cert3.jpg')">
                <input type="file" required class="file-input" accept="image/*">
                <button type="submit" class="btn btn-primary">Upload Cert 3</button>
            </form>
        </div>

        <p style="margin-top:2rem;"><a href="index.html" class="btn btn-secondary">Go to Portfolio</a></p>
    </div>

    <script>
        async function uploadImage(e, targetName) {
            e.preventDefault();
            const form = e.target;
            const fileInput = form.querySelector('input[type="file"]');
            const file = fileInput.files[0];
            const btn = form.querySelector('button');

            const formData = new FormData();
            formData.append("file", file);
            formData.append("target_name", targetName);

            btn.textContent = "Uploading...";
            btn.disabled = true;

            try {
                const res = await fetch("http://localhost:8000/api/upload", {
                    method: "POST",
                    body: formData
                });
                if (res.ok) {
                    btn.textContent = "Success!";
                    btn.style.background = "#34d399";
                } else {
                    btn.textContent = "Failed!";
                    btn.style.background = "red";
                }
            } catch (err) {
                btn.textContent = "Error!";
                btn.style.background = "red";
            }
        }
    </script>
</body>
</html>
